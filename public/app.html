<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1B4332">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Smart Bachat">
<link rel="manifest" href="/manifest.json">
<title>Smart Bachat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080E0A;color:#EEF7F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.gate{position:fixed;inset:0;background:#080E0A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;text-align:center;}
.gate.hidden{display:none;}
.gate-ico{font-size:56px;margin-bottom:12px;}
.gate-title{font-size:22px;font-weight:800;color:#74C69D;margin-bottom:8px;}
.gate-sub{font-size:14px;color:#5E8A68;margin-bottom:28px;line-height:1.6;max-width:300px;}
.gate-btn{width:100%;max-width:300px;padding:16px;background:linear-gradient(135deg,#40916C,#1B4332);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:inherit;}
.gate-btn-out{background:transparent;border:1.5px solid rgba(116,198,157,.35);color:#74C69D;}
.spin-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;color:#5E8A68;font-size:14px;}
.spinner{width:36px;height:36px;border:2px solid rgba(116,198,157,.15);border-top-color:#74C69D;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#appFrame{width:100%;height:100vh;border:none;display:none;}
</style>
</head>
<body>

<div class="gate" id="gateLoading">
  <div class="spin-wrap">
    <div class="spinner"></div>
    <span>Loading Smart Bachat...</span>
  </div>
</div>

<div class="gate hidden" id="gateLogin">
  <div class="gate-ico">🔐</div>
  <div class="gate-title">Login Required</div>
  <div class="gate-sub">Smart Bachat use karne ke liye pehle login karein.</div>
  <button class="gate-btn" onclick="window.location.href='/login'">Login Karein</button>
  <button class="gate-btn gate-btn-out" onclick="window.location.href='/'">Smart Bachat Khareedein — $2.99</button>
</div>

<div class="gate hidden" id="gateNotPurchased">
  <div class="gate-ico">💰</div>
  <div class="gate-title">Access Nahi Hai</div>
  <div class="gate-sub">Aap ne Smart Bachat abhi nahi khareeda. Sirf $2.99 — ek baar ka payment.</div>
  <button class="gate-btn" onclick="window.location.href='/#pricing'">Khareedein — $2.99</button>
  <button class="gate-btn gate-btn-out" onclick="logout()">Logout</button>
</div>

<iframe id="appFrame" src="/smart-bachat-tool" title="Smart Bachat"></iframe>

<script>
var SUPABASE_URL = 'https://lbvwolpvzgxebyfzlndt.supabase.co';
var SUPABASE_KEY = 'sb_publishable_TMS0XJWriaIoBLMG8svz-w_8-qSkQts';
var PRODUCT_ID   = 'smart-bachat';

// ── STORAGE KEYS ─────────────────────────────────────────────
var KEY_SESSION   = 'sb_session';
var KEY_PURCHASED = 'sb_purchased';     // cached purchase status
var KEY_PURCHASE_TS = 'sb_purchase_ts'; // when we last verified

// ── HELPERS ──────────────────────────────────────────────────
function showGate(id) {
  ['gateLoading','gateLogin','gateNotPurchased'].forEach(function(g){
    document.getElementById(g).classList.add('hidden');
  });
  document.getElementById('appFrame').style.display = 'none';
  if (id === 'app') {
    document.getElementById('appFrame').style.display = 'block';
  } else {
    document.getElementById(id).classList.remove('hidden');
  }
}

function logout() {
  localStorage.removeItem(KEY_SESSION);
  localStorage.removeItem(KEY_PURCHASED);
  localStorage.removeItem(KEY_PURCHASE_TS);
  window.location.href = '/login';
}

function saveSession(data) {
  // Always save with 30 day expiry regardless of what server says
  localStorage.setItem(KEY_SESSION, JSON.stringify({
    access_token: data.access_token,
    refresh_token: data.refresh_token || '',
    expires_at: Date.now()/1000 + 2592000 // 30 days
  }));
}

function getSession() {
  try {
    var raw = localStorage.getItem(KEY_SESSION);
    if (!raw) return null;
    var s = JSON.parse(raw);
    if (!s || !s.access_token) return null;
    return s; // Return even if "expired" — we handle refresh separately
  } catch(e) { return null; }
}

function hasCachedPurchase() {
  var purchased = localStorage.getItem(KEY_PURCHASED);
  var ts = parseInt(localStorage.getItem(KEY_PURCHASE_TS) || '0');
  var age = Date.now()/1000 - ts;
  // Cache valid for 7 days
  return purchased === 'true' && age < 604800;
}

function cachePurchase(value) {
  localStorage.setItem(KEY_PURCHASED, value ? 'true' : 'false');
  localStorage.setItem(KEY_PURCHASE_TS, String(Math.floor(Date.now()/1000)));
}

// ── TOKEN REFRESH ─────────────────────────────────────────────
async function refreshToken(refreshToken) {
  if (!refreshToken) return null;
  try {
    var r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY
      },
      body: JSON.stringify({ refresh_token: refreshToken })
    });
    if (!r.ok) return null;
    var data = await r.json();
    if (data && data.access_token) {
      saveSession(data);
      return data.access_token;
    }
    return null;
  } catch(e) {
    return null;
  }
}

// ── PURCHASE CHECK ────────────────────────────────────────────
async function checkPurchase(token) {
  try {
    var r = await fetch(SUPABASE_URL + '/rest/v1/rpc/has_purchased', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ p_product_id: PRODUCT_ID })
    });
    if (!r.ok) return null; // null = network error, not "not purchased"
    var data = await r.json();
    return data === true;
  } catch(e) {
    return null; // null = cannot verify (no network)
  }
}

// ── HANDLE MAGIC LINK TOKEN IN URL ───────────────────────────
async function handleTokenInURL() {
  var url = new URL(window.location.href);
  var hash = window.location.hash;

  // Hash fragment: #access_token=xxx
  if (hash && hash.includes('access_token')) {
    var params = {};
    hash.substring(1).split('&').forEach(function(p) {
      var kv = p.split('=');
      params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
    });
    if (params.access_token) {
      saveSession(params);
      history.replaceState(null, '', '/app');
      return params.access_token;
    }
  }

  // Query params: ?token=xxx&type=magiclink
  var token = url.searchParams.get('token');
  var tokenHash = url.searchParams.get('token_hash');
  var type = url.searchParams.get('type') || 'magiclink';
  var code = url.searchParams.get('code');

  var body = null;
  if (tokenHash) body = { token_hash: tokenHash, type: type };
  else if (token)  body = { token: token, type: type };

  if (body) {
    try {
      var r = await fetch(SUPABASE_URL + '/auth/v1/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify(body)
      });
      var data = await r.json();
      if (data && data.access_token) {
        saveSession(data);
        history.replaceState(null, '', '/app');
        return data.access_token;
      }
    } catch(e) {}
  }

  if (code) {
    try {
      var r2 = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=pkce', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        },
        body: JSON.stringify({ auth_code: code })
      });
      var data2 = await r2.json();
      if (data2 && data2.access_token) {
        saveSession(data2);
        history.replaceState(null, '', '/app');
        return data2.access_token;
      }
    } catch(e) {}
  }

  return null;
}

// ── MAIN INIT ─────────────────────────────────────────────────
window.addEventListener('load', async function() {

  // STEP 1: Check for magic link token in URL
  var url = new URL(window.location.href);
  var hasToken = window.location.hash.includes('access_token') ||
                 url.searchParams.get('token') ||
                 url.searchParams.get('token_hash') ||
                 url.searchParams.get('code');

  var accessToken = null;

  if (hasToken) {
    accessToken = await handleTokenInURL();
  }

  // STEP 2: Get session from storage
  var session = getSession();

  if (!session && !accessToken) {
    // No session at all — must login
    showGate('gateLogin');
    return;
  }

  // STEP 3: Get access token (from URL or session)
  if (!accessToken) {
    accessToken = session.access_token;
  }

  // STEP 4: If we have a cached purchase — open app immediately
  // Then verify in background (no friction for returning users)
  if (hasCachedPurchase()) {
    showGate('app');
    // Silently refresh token and verify purchase in background
    backgroundVerify(session, accessToken);
    return;
  }

  // STEP 5: No cache — try to verify purchase
  var purchased = await checkPurchase(accessToken);

  // STEP 5a: If token expired (null result) — try refresh
  if (purchased === null && session && session.refresh_token) {
    var newToken = await refreshToken(session.refresh_token);
    if (newToken) {
      accessToken = newToken;
      purchased = await checkPurchase(accessToken);
    }
  }

  if (purchased === true) {
    cachePurchase(true);
    showGate('app');
    return;
  }

  if (purchased === null) {
    // Cannot verify — no network. If they have a session, let them in
    // Better UX than blocking on network error
    if (session && session.access_token) {
      showGate('app');
      return;
    }
  }

  // purchased === false — definitely not purchased
  showGate('gateNotPurchased');
});

// ── BACKGROUND VERIFY (non-blocking) ─────────────────────────
async function backgroundVerify(session, accessToken) {
  // Try to refresh token first
  if (session && session.refresh_token) {
    var newToken = await refreshToken(session.refresh_token);
    if (newToken) accessToken = newToken;
  }

  // Verify purchase
  var purchased = await checkPurchase(accessToken);
  if (purchased === true) {
    cachePurchase(true);
  } else if (purchased === false) {
    // Cache expired — they no longer have access (refund etc)
    cachePurchase(false);
    // Don't kick them out immediately — will check next open
  }
}

// ── AUTO REFRESH on visibility change ────────────────────────
// Refresh token every time user comes back to app
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    var session = getSession();
    if (session && session.refresh_token) {
      refreshToken(session.refresh_token); // Silent background refresh
    }
  }
});
</script>
</body>
</html>
