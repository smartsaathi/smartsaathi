<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080E0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Smart Bachat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080E0A;color:#EEF7F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.gate{position:fixed;inset:0;background:#080E0A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;text-align:center;}
.gate.hidden{display:none;}
.gate-ico{font-size:56px;margin-bottom:12px;}
.gate-title{font-size:22px;font-weight:800;color:#74C69D;margin-bottom:8px;}
.gate-sub{font-size:14px;color:#5E8A68;margin-bottom:28px;line-height:1.6;max-width:300px;}
.gate-btn{width:100%;max-width:300px;padding:16px;background:linear-gradient(135deg,#40916C,#1B4332);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:inherit;}
.gate-btn-out{background:transparent;border:1.5px solid rgba(116,198,157,.35);color:#74C69D;}
.spin-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;color:#5E8A68;font-size:14px;}
.spinner{width:36px;height:36px;border:2px solid rgba(116,198,157,.15);border-top-color:#74C69D;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#appFrame{width:100%;height:100vh;border:none;display:none;}
</style>
</head>
<body>

<div class="gate" id="gateLoading">
  <div class="spin-wrap">
    <div class="spinner"></div>
    <span>Checking access...</span>
  </div>
</div>

<div class="gate hidden" id="gateLogin">
  <div class="gate-ico">🔐</div>
  <div class="gate-title">Login Required</div>
  <div class="gate-sub">Smart Bachat use karne ke liye pehle login karein.</div>
  <button class="gate-btn" onclick="window.location.href='/login'">Login Karein</button>
  <button class="gate-btn gate-btn-out" onclick="window.location.href='/'">Smart Bachat Khareedein — $2.99</button>
</div>

<div class="gate hidden" id="gateNotPurchased">
  <div class="gate-ico">💰</div>
  <div class="gate-title">Access Nahi Hai</div>
  <div class="gate-sub">Aap ne Smart Bachat abhi nahi khareeda. Sirf $2.99 — ek baar ka payment.</div>
  <button class="gate-btn" onclick="window.location.href='/#pricing'">Khareedein — $2.99</button>
  <button class="gate-btn gate-btn-out" onclick="logout()">Logout</button>
</div>

<iframe id="appFrame" src="/smart-bachat-tool" title="Smart Bachat"></iframe>

<script>
var SUPABASE_URL = 'https://lbvwolpvzgxebyfzlndt.supabase.co';
var SUPABASE_KEY = 'sb_publishable_TMS0XJWriaIoBLMG8svz-w_8-qSkQts';
var PRODUCT_ID   = 'smart-bachat';

function showGate(id) {
  ['gateLoading','gateLogin','gateNotPurchased'].forEach(function(g){
    document.getElementById(g).classList.add('hidden');
  });
  document.getElementById('appFrame').style.display = 'none';
  if (id === 'app') {
    document.getElementById('appFrame').style.display = 'block';
  } else {
    document.getElementById(id).classList.remove('hidden');
  }
}

function getSession() {
  try {
    var raw = localStorage.getItem('sb_session');
    if (!raw) return null;
    var s = JSON.parse(raw);
    if (!s.access_token) return null;
    if (s.expires_at && s.expires_at < Date.now()/1000) {
      localStorage.removeItem('sb_session');
      return null;
    }
    return s;
  } catch(e) { return null; }
}

function logout() {
  localStorage.removeItem('sb_session');
  window.location.href = '/login';
}

async function checkPurchase(token) {
  try {
    var r = await fetch(SUPABASE_URL + '/rest/v1/rpc/has_purchased', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ p_product_id: PRODUCT_ID })
    });
    if (!r.ok) return false;
    var data = await r.json();
    return data === true;
  } catch(e) { return false; }
}

// Handle magic link token if landed here directly
async function handleTokenInURL() {
  var url = new URL(window.location.href);
  var hash = window.location.hash;

  // Hash fragment: #access_token=xxx
  if (hash && hash.includes('access_token')) {
    var params = {};
    hash.substring(1).split('&').forEach(function(p) {
      var kv = p.split('=');
      params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
    });
    if (params.access_token) {
      localStorage.setItem('sb_session', JSON.stringify({
        access_token: params.access_token,
        refresh_token: params.refresh_token || '',
        expires_at: Date.now()/1000 + parseInt(params.expires_in||3600)
      }));
      history.replaceState(null,'','/app');
      return true;
    }
  }

  // Token in query params — verify with Supabase
  var token = url.searchParams.get('token');
  var tokenHash = url.searchParams.get('token_hash');
  var type = url.searchParams.get('type') || 'magiclink';
  var code = url.searchParams.get('code');

  var body = null;
  if (tokenHash) body = { token_hash: tokenHash, type: type };
  else if (token) body = { token: token, type: type };

  if (body) {
    try {
      var r = await fetch(SUPABASE_URL + '/auth/v1/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify(body)
      });
      var data = await r.json();
      if (data.access_token) {
        localStorage.setItem('sb_session', JSON.stringify({
          access_token: data.access_token,
          refresh_token: data.refresh_token || '',
          expires_at: Date.now()/1000 + (data.expires_in || 3600)
        }));
        history.replaceState(null,'','/app');
        return true;
      }
    } catch(e) {}
  }

  if (code) {
    try {
      var r2 = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=pkce', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        },
        body: JSON.stringify({ auth_code: code })
      });
      var data2 = await r2.json();
      if (data2.access_token) {
        localStorage.setItem('sb_session', JSON.stringify({
          access_token: data2.access_token,
          refresh_token: data2.refresh_token || '',
          expires_at: Date.now()/1000 + (data2.expires_in || 3600)
        }));
        history.replaceState(null,'','/app');
        return true;
      }
    } catch(e) {}
  }

  return false;
}

window.addEventListener('load', async function() {
  // First check if there is a token in URL
  var url = new URL(window.location.href);
  var hasToken = window.location.hash.includes('access_token') ||
                 url.searchParams.get('token') ||
                 url.searchParams.get('token_hash') ||
                 url.searchParams.get('code');

  if (hasToken) {
    await handleTokenInURL();
  }

  // Now check session
  var session = getSession();
  if (!session) {
    showGate('gateLogin');
    return;
  }

  // Check purchase
  var purchased = await checkPurchase(session.access_token);
  if (!purchased) {
    showGate('gateNotPurchased');
    return;
  }

  showGate('app');
});
</script>
</body>
</html>
