<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080E0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Smart Bachat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080E0A;color:#EEF7F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
/* GATE SCREEN */
.gate{position:fixed;inset:0;background:#080E0A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;text-align:center;}
.gate.hidden{display:none;}
.gate-ico{font-size:56px;margin-bottom:12px;}
.gate-title{font-size:22px;font-weight:800;color:#74C69D;margin-bottom:8px;}
.gate-sub{font-size:14px;color:#5E8A68;margin-bottom:28px;line-height:1.6;max-width:300px;}
.gate-btn{width:100%;max-width:300px;padding:16px;background:linear-gradient(135deg,#40916C,#1B4332);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:inherit;}
.gate-btn-out{background:transparent;border:1.5px solid rgba(116,198,157,.35);color:#74C69D;}
.spinner-wrap{display:flex;align-items:center;justify-content:center;gap:12px;color:#5E8A68;font-size:14px;}
.spinner{width:20px;height:20px;border:2px solid rgba(116,198,157,.15);border-top-color:#74C69D;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* APP FRAME */
#appFrame{width:100%;height:100vh;border:none;display:none;}
</style>
</head>
<body>

<!-- LOADING GATE -->
<div class="gate" id="gateLoading">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    Checking access...
  </div>
</div>

<!-- NOT LOGGED IN GATE -->
<div class="gate hidden" id="gateLogin">
  <div class="gate-ico">🔐</div>
  <div class="gate-title">Login Required</div>
  <div class="gate-sub">Smart Bachat use karne ke liye login karein.</div>
  <button class="gate-btn" onclick="window.location.href='/login'">Login Karein</button>
  <button class="gate-btn gate-btn-out" onclick="window.location.href='/'">Smart Bachat Khareedein</button>
</div>

<!-- NOT PURCHASED GATE -->
<div class="gate hidden" id="gateNotPurchased">
  <div class="gate-ico">💰</div>
  <div class="gate-title">Access Nahi Hai</div>
  <div class="gate-sub">Aap ne Smart Bachat abhi tak nahi khareeda. Sirf $2.99 — ek baar ka payment.</div>
  <button class="gate-btn" onclick="window.location.href='/#pricing'">Smart Bachat Khareedein — $2.99</button>
  <button class="gate-btn gate-btn-out" onclick="logout()">Logout</button>
</div>

<!-- APP IFRAME -->
<iframe id="appFrame" src="/smart-bachat-tool" title="Smart Bachat App"></iframe>

<script>
// ── CONFIG ──────────────────────────────────────────────────
var SUPABASE_URL = 'https://lbvwolpvzgxebyfzlndt.supabase.co';
var SUPABASE_KEY = 'sb_publishable_TMS0XJWriaIoBLMG8svz-w_8-qSkQts';
var PRODUCT_ID = 'smart-bachat';

// ── SHOW/HIDE GATES ─────────────────────────────────────────
function showGate(id) {
  ['gateLoading','gateLogin','gateNotPurchased'].forEach(function(g) {
    document.getElementById(g).classList.add('hidden');
  });
  document.getElementById('appFrame').style.display = 'none';
  if (id === 'app') {
    document.getElementById('appFrame').style.display = 'block';
    document.getElementById('gateLoading').classList.add('hidden');
  } else {
    document.getElementById(id).classList.remove('hidden');
  }
}

// ── GET SESSION ─────────────────────────────────────────────
function getSession() {
  try {
    var s = localStorage.getItem('sb_session');
    if (!s) return null;
    var session = JSON.parse(s);
    if (session.expires_at < Date.now()/1000) {
      localStorage.removeItem('sb_session');
      return null;
    }
    return session;
  } catch(e) { return null; }
}

// ── CHECK PURCHASE ──────────────────────────────────────────
async function checkPurchase(token) {
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/rpc/has_purchased', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ p_product_id: PRODUCT_ID })
    });
    if (!res.ok) return false;
    var data = await res.json();
    return data === true;
  } catch(e) { return false; }
}

// ── LOGOUT ──────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('sb_session');
  window.location.href = '/login';
}

// ── MAIN CHECK ──────────────────────────────────────────────
window.addEventListener('load', async function() {
  var session = getSession();

  // Not logged in
  if (!session) {
    showGate('gateLogin');
    return;
  }

  // Check purchase
  var hasPurchased = await checkPurchase(session.access_token);

  if (!hasPurchased) {
    showGate('gateNotPurchased');
    return;
  }

  // All good — show the app
  showGate('app');
});
</script>
</body>
</html>
