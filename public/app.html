<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080E0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Smart Bachat">
<link rel="manifest" href="/manifest.json">
<title>Smart Bachat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080E0A;color:#EEF7F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.gate{position:fixed;inset:0;background:#080E0A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;text-align:center;}
.gate.hidden{display:none;}
.gate-ico{font-size:56px;margin-bottom:12px;}
.gate-title{font-size:22px;font-weight:800;color:#74C69D;margin-bottom:8px;}
.gate-sub{font-size:14px;color:#5E8A68;margin-bottom:28px;line-height:1.6;max-width:300px;}
.gate-btn{width:100%;max-width:300px;padding:16px;background:linear-gradient(135deg,#40916C,#1B4332);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:inherit;}
.gate-btn-out{background:transparent;border:1.5px solid rgba(116,198,157,.35);color:#74C69D;}
.gate-btn-gold{background:linear-gradient(135deg,#F0C040,#F4A261);color:#0A1A10;}
.spin-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;color:#5E8A68;font-size:14px;}
.spinner{width:36px;height:36px;border:2px solid rgba(116,198,157,.15);border-top-color:#74C69D;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#appFrame{width:100%;height:100vh;border:none;display:none;}
</style>
</head>
<body>

<!-- Loading -->
<div class="gate" id="gateLoading">
  <div class="spin-wrap">
    <div class="spinner"></div>
    <span>Login ho raha hai...</span>
  </div>
</div>

<!-- Not logged in -->
<div class="gate hidden" id="gateLogin">
  <div class="gate-ico">🔐</div>
  <div class="gate-title">Login Karein</div>
  <div class="gate-sub">Smart Bachat use karne ke liye apna email dalein — login link milega.</div>
  <button class="gate-btn" onclick="window.location.href='/login'">Login Karein →</button>
  <button class="gate-btn gate-btn-out" onclick="window.location.href='/'">Wapas Jayen</button>
</div>

<!-- No purchase -->
<div class="gate hidden" id="gateNotPurchased">
  <div class="gate-ico">💰</div>
  <div class="gate-title">Access Nahi Hai</div>
  <div class="gate-sub">Smart Bachat abhi nahi khareeda. Sirf SAR 11 — ek baar ka payment. Hamesha ke liye.</div>
  <button class="gate-btn gate-btn-gold" onclick="window.location.href='/checkout'">Abhi Khareedein — SAR 11</button>
  <button class="gate-btn gate-btn-out" onclick="logout()">Logout</button>
</div>

<!-- App iframe -->
<iframe id="appFrame" src="/smart-bachat-tool.html" title="Smart Bachat"></iframe>

<script>
var SUPA_URL = 'https://lbvwolpvzgxebyfzlndt.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxidndvbHB2emd4ZWJ5ZnpsbmR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNjMxODYsImV4cCI6MjA5NTkzOTE4Nn0.IMRvd6lgnaF3oy3XdJRY_88XC3dXpAaoP8AQocW8dAs';

// Session keys — must match smart-bachat-tool.html
var KEY_TOKEN     = 'sb_access_token';
var KEY_REFRESH   = 'sb_refresh_token';
var KEY_PURCHASED = 'sb_purchased';
var KEY_PURCH_TIME = 'sb_purchased_time';

function showGate(id) {
  ['gateLoading','gateLogin','gateNotPurchased'].forEach(function(g){
    var el = document.getElementById(g);
    if(el) el.classList.add('hidden');
  });
  document.getElementById('appFrame').style.display = 'none';
  if(id === 'app'){
    document.getElementById('appFrame').style.display = 'block';
  } else {
    var el = document.getElementById(id);
    if(el) el.classList.remove('hidden');
  }
}

function logout(){
  localStorage.removeItem(KEY_TOKEN);
  localStorage.removeItem(KEY_REFRESH);
  localStorage.removeItem(KEY_PURCHASED);
  localStorage.removeItem(KEY_PURCH_TIME);
  window.location.href = '/login';
}

function saveSession(data){
  if(data.access_token) localStorage.setItem(KEY_TOKEN, data.access_token);
  if(data.refresh_token) localStorage.setItem(KEY_REFRESH, data.refresh_token);
}

function getToken(){ return localStorage.getItem(KEY_TOKEN); }
function getRefresh(){ return localStorage.getItem(KEY_REFRESH); }

function hasCachedPurchase(){
  var p = localStorage.getItem(KEY_PURCHASED);
  var t = parseInt(localStorage.getItem(KEY_PURCH_TIME)||'0');
  return p==='1' && (Date.now() - t) < 30*24*60*60*1000;
}

function cachePurchase(val){
  localStorage.setItem(KEY_PURCHASED, val?'1':'0');
  localStorage.setItem(KEY_PURCH_TIME, Date.now().toString());
}

// Refresh token
async function refreshSession(){
  var rt = getRefresh();
  if(!rt) return null;
  try{
    var r = await fetch(SUPA_URL+'/auth/v1/token?grant_type=refresh_token',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
      body:JSON.stringify({refresh_token:rt})
    });
    var d = await r.json();
    if(d && d.access_token){ saveSession(d); return d.access_token; }
    return null;
  }catch(e){ return null; }
}

// Verify magic link token from URL
async function verifyMagicLink(params){
  var tokenHash = params.get('token_hash');
  var token = params.get('token');
  var type = params.get('type') || 'magiclink';
  var code = params.get('code');

  // Try token_hash first (newer Supabase)
  if(tokenHash){
    try{
      var r = await fetch(SUPA_URL+'/auth/v1/verify',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
        body:JSON.stringify({token_hash:tokenHash, type:type})
      });
      var d = await r.json();
      if(d && d.access_token){ saveSession(d); return d.access_token; }
    }catch(e){}
  }

  // Try token (older format)
  if(token){
    try{
      var r2 = await fetch(SUPA_URL+'/auth/v1/verify',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
        body:JSON.stringify({token:token, type:type})
      });
      var d2 = await r2.json();
      if(d2 && d2.access_token){ saveSession(d2); return d2.access_token; }
    }catch(e){}
  }

  // Try code (PKCE flow)
  if(code){
    try{
      var r3 = await fetch(SUPA_URL+'/auth/v1/token?grant_type=pkce',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
        body:JSON.stringify({auth_code:code})
      });
      var d3 = await r3.json();
      if(d3 && d3.access_token){ saveSession(d3); return d3.access_token; }
    }catch(e){}
  }

  // Try hash fragment
  var hash = window.location.hash;
  if(hash && hash.includes('access_token')){
    var hp = {};
    hash.substring(1).split('&').forEach(function(p){
      var kv=p.split('=');
      hp[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'');
    });
    if(hp.access_token){ saveSession(hp); return hp.access_token; }
  }

  return null;
}

// Check purchase via Supabase RPC
async function checkPurchase(token){
  try{
    var r = await fetch(SUPA_URL+'/rest/v1/rpc/has_purchased',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPA_KEY,
        'Authorization':'Bearer '+token
      },
      body:'{}'
    });
    if(!r.ok) return null;
    var d = await r.json();
    return d===true;
  }catch(e){ return null; }
}

// ── MAIN FLOW ──
window.addEventListener('load', async function(){
  var urlParams = new URLSearchParams(window.location.search);
  var hasUrlToken = urlParams.get('token_hash') || urlParams.get('token') ||
                    urlParams.get('code') || window.location.hash.includes('access_token');

  var token = null;

  // Step 1: Handle magic link in URL
  if(hasUrlToken){
    token = await verifyMagicLink(urlParams);
    if(token){
      history.replaceState(null,'','/app');
    }
  }

  // Step 2: Get token from storage
  if(!token) token = getToken();

  // Step 3: No token at all — show login
  if(!token){
    showGate('gateLogin');
    return;
  }

  // Step 4: Has cached purchase — open app immediately
  // But verify silently in background to prevent fake cache
  if(hasCachedPurchase()){
    showGate('app');
    setTimeout(async function(){
      var bgToken = getToken();
      if(!bgToken) bgToken = await refreshSession();
      if(bgToken){
        var verified = await checkPurchase(bgToken);
        if(verified === false){
          localStorage.removeItem(KEY_TOKEN);
          localStorage.removeItem(KEY_REFRESH);
          localStorage.removeItem(KEY_PURCHASED);
          localStorage.removeItem(KEY_PURCH_TIME);
          showGate('gateNotPurchased');
        }
      }
    }, 3000);
    return;
  }

  // Step 5: Verify purchase
  var purchased = await checkPurchase(token);

  // Step 5a: Token expired — try refresh
  if(purchased === null){
    var newToken = await refreshSession();
    if(newToken){
      token = newToken;
      purchased = await checkPurchase(token);
    }
  }

  if(purchased === true){
    cachePurchase(true);
    showGate('app');
    return;
  }

  if(purchased === null){
    // Network error — if token exists give benefit of doubt
    if(token){ showGate('app'); return; }
  }

  // Not purchased
  cachePurchase(false);
  showGate('gateNotPurchased');
});

// Auto refresh on tab focus
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible') refreshSession();
});
</script>
</body>
</html>
