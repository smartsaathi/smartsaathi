<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080E0A">
<title>Login — SmartSaathi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--g1:#1B4332;--g3:#40916C;--g4:#74C69D;--a2:#F4A261;--bg:#080E0A;--bgc:#0F1A12;--bgp:#162019;--tx:#EEF7F0;--ts:#B8D4BE;--tm:#5E8A68;--bd:rgba(116,198,157,.13);--red:#E07A7A;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 5% 0%,rgba(45,106,79,.09),transparent 60%);pointer-events:none;}
.box{width:100%;max-width:360px;position:relative;z-index:1;}
.logo{text-align:center;margin-bottom:32px;}
.logo-ico{font-size:52px;display:block;margin-bottom:8px;}
.logo-name{font-size:24px;font-weight:800;color:var(--g4);}
.card{background:var(--bgc);border:1px solid var(--bd);border-radius:20px;padding:28px 24px;}
.card-title{font-size:20px;font-weight:800;color:var(--tx);margin-bottom:6px;}
.card-sub{font-size:14px;color:var(--tm);margin-bottom:24px;line-height:1.6;}
.lbl{font-size:11px;letter-spacing:.1em;color:var(--tm);text-transform:uppercase;margin-bottom:7px;}
.inp{width:100%;background:var(--bgp);border:1.5px solid var(--bd);border-radius:12px;padding:14px 16px;color:var(--tx);font-size:17px;outline:none;transition:border-color .2s;-webkit-appearance:none;margin-bottom:16px;}
.inp:focus{border-color:var(--g4);}
.inp::placeholder{color:var(--tm);}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--g3),var(--g1));border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.msg{margin-top:14px;padding:13px;border-radius:12px;font-size:14px;line-height:1.6;display:none;}
.msg.ok{background:rgba(116,198,157,.08);border:1px solid rgba(116,198,157,.25);color:var(--g4);}
.msg.err{background:rgba(224,122,122,.08);border:1px solid rgba(224,122,122,.25);color:var(--red);}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--bd);}
.divider-txt{font-size:12px;color:var(--tm);}
.buy-btn{width:100%;padding:14px;background:transparent;border:1.5px solid rgba(116,198,157,.35);border-radius:14px;color:var(--g4);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.footer-note{text-align:center;font-size:12px;color:var(--tm);margin-top:20px;line-height:1.7;}
.footer-note a{color:var(--g4);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.loading-overlay.hidden{display:none;}
.loading-spin{width:36px;height:36px;border:2px solid rgba(116,198,157,.15);border-top-color:var(--g4);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
.loading-txt{font-size:14px;color:var(--tm);}
</style>
</head>
<body>

<!-- Loading overlay shown while processing magic link -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spin"></div>
  <div class="loading-txt">Login ho raha hai...</div>
</div>

<div class="box hidden" id="mainBox">
  <div class="logo">
    <span class="logo-ico">💰</span>
    <div class="logo-name">SmartSaathi</div>
  </div>
  <div class="card">
    <div class="card-title">Login karein</div>
    <div class="card-sub">Apna email dalein — login link aayega.</div>
    <div class="lbl">Email</div>
    <input class="inp" type="email" id="emailInp" placeholder="aapka@email.com" inputmode="email" autocomplete="email">
    <button class="btn" id="loginBtn" onclick="sendMagicLink()">Login Link Bhejein</button>
    <div class="msg" id="loginMsg"></div>
    <div class="divider"><div class="divider-line"></div><div class="divider-txt">ya</div><div class="divider-line"></div></div>
    <button class="buy-btn" onclick="window.location.href='/'">Smart Bachat Khareedein — $2.99</button>
  </div>
  <div class="footer-note">
    Koi masla? <a href="mailto:hello@smartsaathi.app">hello@smartsaathi.app</a>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://lbvwolpvzgxebyfzlndt.supabase.co';
var SUPABASE_KEY = 'sb_publishable_TMS0XJWriaIoBLMG8svz-w_8-qSkQts';

function showMain() {
  document.getElementById('loadingOverlay').classList.add('hidden');
  document.getElementById('mainBox').classList.remove('hidden');
}

function showMsg(txt, type) {
  var el = document.getElementById('loginMsg');
  el.textContent = txt;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

function saveSession(data) {
  var session = {
    access_token: data.access_token,
    refresh_token: data.refresh_token || '',
    expires_at: Date.now()/1000 + (data.expires_in || 3600)
  };
  localStorage.setItem('sb_session', JSON.stringify(session));
}

// ── HANDLE ALL SUPABASE CALLBACK TYPES ──────────────────────
async function handleCallback() {
  var url = new URL(window.location.href);
  var hash = window.location.hash;

  // TYPE 1: PKCE flow — ?code=xxx in URL params
  var code = url.searchParams.get('code');
  if (code) {
    try {
      var r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=pkce', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        },
        body: JSON.stringify({ auth_code: code })
      });
      var data = await r.json();
      if (data.access_token) {
        saveSession(data);
        window.location.href = '/app';
        return true;
      }
    } catch(e) {}
  }

  // TYPE 2: Hash fragment — #access_token=xxx
  if (hash && hash.includes('access_token')) {
    var params = {};
    hash.substring(1).split('&').forEach(function(p) {
      var kv = p.split('=');
      params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
    });
    if (params.access_token) {
      saveSession(params);
      history.replaceState(null, '', '/login');
      window.location.href = '/app';
      return true;
    }
  }

  // TYPE 3: Token hash — ?token_hash=xxx&type=magiclink
  var tokenHash = url.searchParams.get('token_hash');
  var type = url.searchParams.get('type');
  if (tokenHash && type) {
    try {
      var r2 = await fetch(SUPABASE_URL + '/auth/v1/verify', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY
        },
        body: JSON.stringify({ token_hash: tokenHash, type: type })
      });
      var data2 = await r2.json();
      if (data2.access_token) {
        saveSession(data2);
        window.location.href = '/app';
        return true;
      }
    } catch(e) {}
  }

  return false;
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load', async function() {
  // Check if this is a callback from magic link
  var url = new URL(window.location.href);
  var hasCallback = url.searchParams.get('code') ||
                    url.searchParams.get('token_hash') ||
                    window.location.hash.includes('access_token');

  if (hasCallback) {
    var success = await handleCallback();
    if (!success) {
      showMain();
      showMsg('Link expire ho gaya. Naya link mangein.', 'err');
    }
    return;
  }

  // Check existing session
  var saved = localStorage.getItem('sb_session');
  if (saved) {
    try {
      var s = JSON.parse(saved);
      if (s.access_token && s.expires_at > Date.now()/1000) {
        window.location.href = '/app';
        return;
      }
    } catch(e) {}
  }

  showMain();
});

// ── SEND MAGIC LINK ──────────────────────────────────────────
async function sendMagicLink() {
  var email = document.getElementById('emailInp').value.trim();
  if (!email || !email.includes('@')) {
    showMsg('Sahi email dalein.', 'err');
    return;
  }
  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Bhej raha hoon...';

  try {
    var r = await fetch(SUPABASE_URL + '/auth/v1/otp', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({
        email: email,
        options: {
          emailRedirectTo: 'https://smartsaathi.app/login'
        }
      })
    });

    if (r.ok || r.status === 200) {
      showMsg('✅ Email bhej diya! Inbox check karein aur link par click karein.', 'ok');
      btn.innerHTML = '✅ Email Bhej Diya';
    } else {
      var d = await r.json();
      showMsg('❌ ' + (d.msg || d.error_description || 'Kuch masla hua. Dobara try karein.'), 'err');
      btn.disabled = false;
      btn.innerHTML = 'Login Link Bhejein';
    }
  } catch(e) {
    showMsg('❌ Internet check karein.', 'err');
    btn.disabled = false;
    btn.innerHTML = 'Login Link Bhejein';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  var inp = document.getElementById('emailInp');
  if (inp) inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMagicLink();
  });
});
</script>
</body>
</html>
